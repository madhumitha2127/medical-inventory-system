<!DOCTYPE html>
<html>
<head>
    <title>MediTrack Login</title>
</head>
<body>
    <h1>MediTrack Login</h1>

    <form method="POST" action="/login">
        <label>Username:</label>
        <input type="text" name="username" required/>
        
        <br><br>
        
        <label>Password:</label>
        <input type="password" name="password" required/>
        
        <br><br>
        
        <button type="submit">Login</button>
    </form>
<div style="margin-top:20px; padding:10px; background:#f0f0f0; border:1px solid #ccc;">
    <p><strong>Example Credentials:</strong></p>
    <p>Admin → username: admin | password: admin123</p>
    <p>Staff → username: staff1 | password: staff123</p>
</div>
</body>
</html>
