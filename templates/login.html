<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>MediTrack Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a0a1a 100%);
            z-index: 0;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
            opacity: 0.15;
        }
        .c1 { width:300px; height:300px; background:#00c9a7; top:-100px; left:-100px; animation-delay:0s; }
        .c2 { width:200px; height:200px; background:#007cf0; bottom:-80px; right:-80px; animation-delay:2s; }
        .c3 { width:150px; height:150px; background:#00c9a7; top:50%; right:10%; animation-delay:4s; }
        .c4 { width:100px; height:100px; background:#007cf0; bottom:20%; left:5%; animation-delay:1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Login card */
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 420px;
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .logo h1 {
            color: #00c9a7;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .logo p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 4px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
        input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white; font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #00c9a7;
            background: rgba(0,201,167,0.1);
            box-shadow: 0 0 0 3px rgba(0,201,167,0.2);
        }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #00c9a7, #007cf0);
            border: none; border-radius: 12px;
            color: white; font-size: 1rem;
            font-weight: 700; cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,201,167,0.4);
        }
        .btn-login:active { transform: translateY(0); }

        .error {
            background: rgba(255,77,77,0.15);
            border: 1px solid rgba(255,77,77,0.3);
            color: #ff6b6b; padding: 12px;
            border-radius: 10px; margin-bottom: 20px;
            text-align: center; font-size: 0.9rem;
        }

        .demo-box {
            margin-top: 24px;
            background: rgba(0,201,167,0.08);
            border: 1px solid rgba(0,201,167,0.2);
            border-radius: 12px; padding: 16px;
            font-size: 0.82rem;
        }
        .demo-box p { color: rgba(255,255,255,0.5); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
        .demo-box code {
            display: block; background: rgba(0,0,0,0.3);
            padding: 6px 10px; border-radius: 6px;
            color: #00c9a7; margin: 4px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>
</div>

<div class="login-wrap">
    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">💊</span>
            <h1>MEDITRACK</h1>
            <p>Medical Inventory Management System</p>
        </div>

        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" placeholder="Enter your username" required/>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" placeholder="Enter your password" required/>
            </div>
            <button type="submit" class="btn-login">🔐 SIGN IN</button>
        </form>

        <div class="demo-box">
            <p>DEMO CREDENTIALS</p>
            <code>admin / admin123 → Full Access</code>
            <code>staff1 / staff123 → Staff Access</code>
        </div>
    </div>
</div>
</body>
</html>
